<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Atelier Zaina</title>

  <link rel="stylesheet" href="css/style.css" />

  <!-- Tab icon (favicon) -->
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="apple-touch-icon" href="images/logo.png">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="images/logo.png" alt="Atelier Zaina logo" class="logo" />
        <span class="brand-name">Atelier Zaina</span>
      </a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="services.html">Services &amp; Pricing</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="contact-hero">
    <h1>Contact</h1>
    <p>
    For availability, quotes, or custom requests, send an enquiry using the form below.
    </p>
    </section>


    <section class="card">
      <h2>Send an Enquiry</h2>

      <!-- IMPORTANT: no action="" because we handle submit with JS fetch -->
      <form id="contactForm" class="form" novalidate>
        <div class="form-grid">
          <div class="field">
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required>
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>

          <div class="field">
            <label for="date">Event Date (optional)</label>
            <input id="date" name="date" type="date">
          </div>

          <div class="field field-full">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
        </div>

        <button type="submit">Send Enquiry</button>

        <p class="note">
          Note: This prototype sends enquiries via a server-side script when hosted (e.g., university server).
        </p>

        <p id="formStatus" class="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Atelier Zaina</p>
      <div class="footer-links">
        <a href="https://www.instagram.com/atelierzaina/" target="_blank">
        <img src="images/instagram.png" alt="Instagram" class="social-icon">
        </a>
        <a href="https://www.tiktok.com/@atelierzaina" target="_blank">
        <img src="images/tiktok.png" alt="TikTok" class="social-icon tiktok-icon">
        </a>
        <a href="/admin/login.php" class="admin-link">Admin</a>
      </div>
    </div>
  </footer>

  <script>
    // Footer year
    document.getElementById("year").textContent = new Date().getFullYear();

    // Contact form submit (NO MAILTO)
    const form = document.getElementById("contactForm");
    const statusMsg = document.getElementById("formStatus");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // Basic browser validation message (optional)
      if (!form.checkValidity()) {
        statusMsg.textContent = "Please fill in all required fields.";
        return;
      }

      statusMsg.textContent = "Sending your enquiry…";

      const formData = new FormData(form);

      try {
        const res = await fetch("send_enquiry.php", {
          method: "POST",
          body: formData
        });

        const text = await res.text();

        if (res.ok && text.trim() === "OK") {
          form.reset();
          statusMsg.textContent = "Your enquiry has been sent successfully.";
        } else {
          statusMsg.textContent = "Something went wrong. Please try again.";
        }
      } catch (err) {
        statusMsg.textContent = "Network/server error. This will work once hosted on the university server.";
      }
    });
  </script>
</body>
</html>
